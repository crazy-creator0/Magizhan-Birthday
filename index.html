<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited! 🎉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Georgia', serif;
      color: white;
      text-align: center;
    }
    .cake { font-size: 80px; animation: bounce 1s infinite alternate; }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-15px); }
    }
    h1 { font-size: 2rem; margin: 20px 0 10px; letter-spacing: 2px; }
    p  { color: #aaa; font-size: 1rem; margin-bottom: 30px; }
    .bar-bg {
      width: 260px; height: 6px;
      background: #333; border-radius: 10px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #f9a825, #e53935);
      border-radius: 10px;
      animation: fill 3s linear forwards;  /* ← change 3s to adjust delay */
    }
    @keyframes fill { to { width: 100%; } }
    .note { margin-top: 20px; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <div class="cake">🎂</div>
  <h1>You're Invited! for Magizhan's Birthday</h1>
  <p>Taking you to the venue...</p>
  <div class="bar-bg"><div class="bar-fill"></div></div>
<div class="note" id="msg" style="font-size:20px; color:blue;">
  Redirecting in 3 seconds
</div>
<div style="margin-top:20px;">
  <button onclick="bookRapido()" 
    style="padding:10px 20px; margin:5px; border:none; border-radius:5px; background:#ffcc00; cursor:pointer;">
    🚀 Book Rapido
  </button>

  <button onclick="skipNow()" 
    style="padding:10px 20px; margin:5px; border:none; border-radius:5px; background:#00c853; color:white; cursor:pointer;">
    ⏩ Skip Waiting
  </button>
</div>
  <script>
    const destination = "12.966962, 80.253182";
    setTimeout(() => {
      window.location.href =
        `https://www.google.com/maps/dir/?api=1&destination=${destination}`;
    }, 10000);
    let count = 10;

let timer = setInterval(function() {
  count--;

  document.getElementById("msg").innerText = 
    "Redirecting in " + count + " seconds";

  if (count === 0) {
    clearInterval(timer);
  }
}, 1000);
    function skipNow() {
  window.location.href =
    `https://www.google.com/maps/dir/?api=1&destination=${destination}`;
}

function bookRapido() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      // Rapido deep link (fallback to maps if not supported)
      window.location.href =
        `https://rapido.bike/?pickup=${lat},${lon}&drop=${destination}`;
    }, function() {
      alert("Location access denied ❌");
    });
  } else {
    alert("Geolocation not supported ❌");
  }
}
  </script>
</body>
</html>
