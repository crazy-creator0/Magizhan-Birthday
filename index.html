<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magizhan's Birthday 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rapido: #f9c900;
      --uber: #000000;
      --maps: #4285F4;
      --text-main: #2d3748;
      --text-muted: #718096;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Poppins', sans-serif;
    }

    body {
      /* Festive warm gradient */
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      transform: translateY(0);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cake-container {
      font-size: 70px;
      margin-bottom: 10px;
      display: inline-block;
      animation: gentleBounce 2s infinite ease-in-out;
    }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }

    h1 { 
      color: var(--text-main);
      font-size: 1.6rem; 
      font-weight: 700;
      margin-bottom: 8px; 
    }

    p.subtitle { 
      color: var(--text-muted); 
      font-size: 0.95rem; 
      margin-bottom: 25px; 
      line-height: 1.5;
    }

    /* Progress Bar UI */
    .progress-container {
      background: #edf2f7;
      border-radius: 12px;
      height: 8px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FF6B6B, #FF8E53);
      border-radius: 12px;
      animation: fillBar 10s linear forwards;
    }

    @keyframes fillBar { 
      to { width: 100%; } 
    }

    .timer-text { 
      font-size: 0.9rem; 
      color: #FF6B6B; 
      font-weight: 600;
      margin-bottom: 30px;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Modern Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 1rem;
      transition: all 0.2s ease;
      width: 100%;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-uber { background: var(--uber); color: white; }
    .btn-rapido { background: var(--rapido); color: black; }
    .btn-maps { background: #f0f4f8; color: var(--maps); border: 1px solid #d9e2ec; }

    /* Icons inside buttons */
    .btn-icon { font-size: 1.2rem; }

  </style>
</head>
<body>

  <div class="card">
    <div class="cake-container">🎂</div>
    <h1>Magizhan's Birthday!</h1>
    <p class="subtitle">Join the celebration! We are navigating you to the party venue.</p>
    
    <div class="progress-container">
      <div class="progress-fill"></div>
    </div>
    
    <div class="timer-text" id="msg">
      Redirecting in 10 seconds...
    </div>
    
    <div class="btn-group">
      <!-- Uber Button -->
      <button onclick="bookUber()" class="btn btn-uber">
        <span class="btn-icon">🚗</span> Book with Uber
      </button>

      <!-- Rapido Button -->
      <button onclick="bookRapido()" class="btn btn-rapido">
        <span class="btn-icon">🛵</span> Open Rapido
      </button>
      
      <!-- Skip/Maps Button -->
      <button onclick="skipNow()" class="btn btn-maps">
        <span class="btn-icon">🗺️</span> Open Google Maps
      </button>
    </div>
  </div>

  <script>
    // Venue Coordinates
    const destLat = "12.966962";
    const destLng = "80.253182";
    let count = 10;

    const msgElement = document.getElementById("msg");
    msgElement.innerText = `Redirecting in ${count} seconds...`;

    // Countdown timer logic
    let timer = setInterval(function () {
      count--;
      msgElement.innerText = `Redirecting in ${count} seconds...`;
      if (count <= 0) {
        clearInterval(timer);
        goToMaps();
      }
    }, 1000);

    // Redirect to Google Maps
    function goToMaps() {
      window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}`;
    }

    // Skip wait time
    function skipNow() {
      clearInterval(timer);
      goToMaps();
    }

    // Unified App Opener (Smart Fallback for both Android & iOS)
    function tryOpenApp(deepLink, storeLink) {
      const start = Date.now();
      
      const fallbackTimer = setTimeout(() => {
        // If time passed is less than 2.5s, it means the app didn't open and browser is still active
        if (Date.now() - start < 2500) {
          window.location.href = storeLink;
        }
      }, 2000);

      const clearFallback = () => clearTimeout(fallbackTimer);
      window.addEventListener('visibilitychange', () => { if (document.hidden) clearFallback(); });
      window.addEventListener('pagehide', clearFallback);
      window.addEventListener('blur', clearFallback);

      window.location.href = deepLink;
    }

    // Rapido Logic
    function bookRapido() {
      clearInterval(timer); // Stop auto-redirect
      const isAndroid = /android/i.test(navigator.userAgent || navigator.vendor || window.opera);
      
      const storeUrl = isAndroid 
        ? "https://play.google.com/store/apps/details?id=com.rapido.passenger" 
        : "https://apps.apple.com/in/app/rapido-bike-taxi-auto/id1192561131";
        
      tryOpenApp("rapido://", storeUrl);
    }

    // Uber Logic
    function bookUber() {
      clearInterval(timer); // Stop auto-redirect
      // Uber's official Universal Link is the safest. It bypasses intent restrictions completely!
      window.location.href = `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${destLat}&dropoff[longitude]=${destLng}`;
    }
  </script>
</body>
</html>
